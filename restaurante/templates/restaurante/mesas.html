{% extends 'restaurante/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🪑 Mesas del Restaurante</h2>
</div>

<!-- FORMULARIO CREAR MESA -->
<div class="card mb-4">
    <div class="card-header bg-dark text-white">Agregar Mesa</div>
    <div class="card-body">
        <form id="formMesa">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Número de mesa</label>
                    <input type="number" id="numero" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Capacidad</label>
                    <input type="number" id="capacidad" class="form-control" required>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100">Crear Mesa</button>
                </div>
            </div>
        </form>
        <div id="mensajeMesa" class="mt-2"></div>
    </div>
</div>

<!-- LISTA DE MESAS -->
<div class="card">
    <div class="card-header bg-dark text-white">Mesas Registradas</div>
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>N°</th>
                    <th>Número</th>
                    <th>Capacidad</th>
                    <th>Disponible</th>
                </tr>
            </thead>
            <tbody id="tablaMesas"></tbody>
        </table>
    </div>
</div>

<script>
const TOKEN = localStorage.getItem('token');
const API = 'http://127.0.0.1:8000/api';

// Cargar mesas al entrar a la página
async function cargarMesas() {
    const res = await fetch(`${API}/mesas/`, {
        headers: { 'Authorization': `Token ${TOKEN}` }
    });
    const mesas = await res.json();
    const tbody = document.getElementById('tablaMesas');
    tbody.innerHTML = '';
    mesas.forEach(m => {
        tbody.innerHTML += `
            <tr>
                <td>${m.id}</td>
                <td>Mesa ${m.numero}</td>
                <td>${m.capacidad} personas</td>
                <td>${m.disponible ? '✅ Libre' : '❌ Ocupada'}</td>
            </tr>`;
    });
}

// Crear mesa
document.getElementById('formMesa').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await fetch(`${API}/mesas/`, {
        method: 'POST',
        headers: {
            'Authorization': `Token ${TOKEN}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            numero: parseInt(document.getElementById('numero').value),
            capacidad: parseInt(document.getElementById('capacidad').value),
            disponible: true
        })
    });
    const data = await res.json();
    const msg = document.getElementById('mensajeMesa');
    if (res.ok) {
        msg.innerHTML = '<div class="alert alert-success">✅ Mesa creada correctamente</div>';
        cargarMesas();
    } else {
        msg.innerHTML = `<div class="alert alert-danger">❌ ${JSON.stringify(data)}</div>`;
    }
});

cargarMesas();
</script>
{% endblock %}
