{% extends 'restaurante/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4> Restaurante Tolimense</h4>
                <small>Inicia sesión para continuar</small>
            </div>
            <div class="card-body p-4">
                <form id="formLogin">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Ingresar</button>
                </form>
                <div id="mensajeLogin" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await fetch('http://127.0.0.1:8000/api/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    });
    const data = await res.json();
    const msg = document.getElementById('mensajeLogin');
    if (res.ok) {
        // Guarda el token en localStorage
        localStorage.setItem('token', data.token);
        msg.innerHTML = '<div class="alert alert-success">✅ Ingresando...</div>';
        // Redirige a mesas
        setTimeout(() => window.location.href = '/mesas/', 1000);
    } else {
        msg.innerHTML = '<div class="alert alert-danger">❌ Usuario o contraseña incorrectos</div>';
    }
});
</script>
{% endblock %}
